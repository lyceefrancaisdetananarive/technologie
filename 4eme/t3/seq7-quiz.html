<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz — Séq. 7 : Projet collaboratif | 4ème</title>
  <link rel="icon" type="image/png" href="../../img/logo-lft.png">
  <link rel="stylesheet" href="../../css/style.css">
</head>
<body>
  <div id="app" data-page="4eme"
    data-breadcrumb='[{"label":"Accueil","url":"../../index.html"},{"label":"4ème","url":"../index.html"},{"label":"T3 — Séquence 7"},{"label":"Quiz"}]'>

    <main class="site-main">
      <div class="page-header">
        <span class="page-level-badge level-4eme">&#x1F7E2; 4ème · Trimestre 3 · Quiz</span>
        <h1>Quiz — Projet collaboratif</h1>
        <p class="page-description">Teste tes connaissances sur la démarche de projet, le cahier des charges et la gestion de projet.</p>
      </div>
      <div class="page-actions no-print">
        <a href="seq7-activite.html" class="btn btn-outline">&#x1F4DD; Revoir la fiche</a>
      </div>
      <div class="quiz-container" id="quiz-container"></div>
    </main>
  </div>

  <script src="../../js/components.js"></script>
  <script src="../../js/quiz-engine.js"></script>
  <script>
    const questions = [
      {
        type: 'qcm',
        question: 'Qu\'est-ce qu\'une fonction de service dans un cahier des charges ?',
        options: ['Le prix du produit', 'Un service rendu par le produit à l\'utilisateur ou à son environnement', 'Le matériau utilisé', 'La marque du fabricant'],
        correct: 1,
        explanation: 'Une fonction de service décrit ce que le produit doit faire pour satisfaire le besoin de l\'utilisateur (fonction principale) ou s\'adapter à son environnement (fonction contrainte).'
      },
      {
        type: 'vrai_faux',
        question: 'Le diagramme de Gantt montre les tâches d\'un projet sur un axe de temps.',
        correct: true,
        explanation: 'Le diagramme de Gantt est un outil de planification : chaque tâche est représentée par une barre horizontale dont la longueur correspond à sa durée. Il permet de visualiser les dépendances entre tâches.'
      },
      {
        type: 'qcm',
        question: 'Quelle est la bonne séquence des étapes d\'un projet technique ?',
        options: ['Réaliser → Concevoir → Tester → Besoin', 'Besoin → Cahier des charges → Conception → Réalisation → Tests → Présentation', 'Présenter → Fabriquer → Tester → Concevoir', 'Tester → Besoin → Réaliser → Concevoir'],
        correct: 1,
        explanation: 'La démarche de projet suit un ordre logique : on part du besoin, on définit les contraintes (CdC), on conçoit une solution, on la réalise, on teste et enfin on présente le résultat.'
      },
      {
        type: 'qcm',
        question: 'À quoi sert une revue de projet ?',
        options: ['À critiquer le travail des autres', 'À faire un point d\'étape pour valider l\'avancement et ajuster si nécessaire', 'À distribuer les notes', 'À supprimer des tâches du planning'],
        correct: 1,
        explanation: 'La revue de projet est un point d\'étape où l\'équipe vérifie l\'avancement, identifie les problèmes et décide des ajustements à apporter.'
      },
      {
        type: 'vrai_faux',
        question: 'Dans un projet collaboratif, tous les membres du groupe doivent faire exactement la même chose.',
        correct: false,
        explanation: 'Le travail collaboratif implique une répartition des rôles : chaque membre a des tâches spécifiques adaptées à ses compétences, tout en contribuant à l\'objectif commun.'
      },
      {
        type: 'qcm',
        question: 'Qu\'est-ce qu\'un critère d\'appréciation dans un cahier des charges ?',
        options: ['La note attribuée au projet', 'Un moyen mesurable de vérifier qu\'une fonction est remplie', 'Le délai de livraison', 'Le nom du responsable'],
        correct: 1,
        explanation: 'Un critère d\'appréciation est une grandeur mesurable associée à une fonction. Par exemple, pour "détecter un obstacle", le critère peut être "distance de détection" avec un niveau de "20 cm minimum".'
      },
      {
        type: 'qcm',
        question: 'Quelle est la différence entre un croquis et un dessin technique ?',
        options: ['Il n\'y a aucune différence', 'Le croquis est fait à main levée, le dessin technique est normalisé avec des cotes', 'Le dessin technique est en couleur, le croquis en noir et blanc', 'Le croquis est numérique, le dessin technique est sur papier'],
        correct: 1,
        explanation: 'Le croquis est un dessin rapide à main levée pour exprimer une idée. Le dessin technique respecte des normes (traits, cotes, échelle) pour permettre la fabrication.'
      },
      {
        type: 'vrai_faux',
        question: 'Un prototype doit être parfait dès la première version.',
        correct: false,
        explanation: 'Un prototype sert justement à tester une solution. Il est normal de devoir l\'améliorer après les tests. C\'est le principe de la démarche itérative : concevoir → tester → améliorer → re-tester.'
      },
      {
        type: 'qcm',
        question: 'Que représente le "chemin critique" dans un diagramme de Gantt ?',
        options: ['Les tâches les plus faciles', 'La séquence de tâches la plus longue qui détermine la durée totale du projet', 'Les tâches optionnelles', 'Les tâches à supprimer'],
        correct: 1,
        explanation: 'Le chemin critique est la chaîne de tâches dépendantes la plus longue. Tout retard sur ces tâches retarde l\'ensemble du projet.'
      },
      {
        type: 'qcm',
        question: 'Pourquoi utilise-t-on des outils numériques collaboratifs dans un projet ?',
        options: ['Pour jouer à des jeux vidéo', 'Pour partager des documents, planifier et communiquer en temps réel', 'Pour remplacer le professeur', 'Pour imprimer les documents'],
        correct: 1,
        explanation: 'Les outils collaboratifs (documents partagés, messagerie, planning en ligne) permettent à tous les membres du groupe de travailler ensemble, même à distance, et de garder une trace de l\'avancement.'
      }
    ];
    new QuizEngine('quiz-container', questions);
  </script>
</body>
</html>
