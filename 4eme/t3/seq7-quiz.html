</head>
<body>
  <div id="app" data-page="4eme"
    data-breadcrumb='[{"label":"Accueil","url":"../../index.html"},{"label":"4ème","url":"../index.html"},{"label":"T3 — Séquence 7"},{"label":"Quiz"}]'
    data-print-title="QUIZ — Séquence 7 : Projet collaboratif"
    data-print-subtitle="4ème · Technologie · Lycée Français de Tananarive">
    <main class="site-main">
      <div class="page-header">
        <span class="page-level-badge level-4eme">&#x1F7E2; 4ème · T3 · Quiz</span>
        <h1>Quiz — Séquence 7</h1>
        <p class="page-description">Projet collaboratif — Teste tes connaissances !</p>
      </div>
      <div class="page-actions no-print">
        <a href="seq7-revision.html" class="btn btn-outline">&#x1F4D6; Révision</a>
        <a href="seq7-structuration.html" class="btn btn-outline">&#x1F4D8; Structuration</a>
      </div>

      <div class="content-card">
        <div id="quiz-container"></div>
      </div>
    </main>
  </div>
  <script src="../../js/components.js"></script>
  <script src="../../js/quiz-engine.js"></script>
  <script>
    const questions = [
      {
        type: 'qcm',
        question: 'Quelle est la première étape de la démarche de projet ?',
        options: ['Fabrication', 'Analyse du besoin', 'Présentation orale', 'Programmation'],
        correct: 1,
        explanation: 'La démarche de projet commence toujours par l\'analyse du besoin : identifier le problème à résoudre.'
      },
      {
        type: 'qcm',
        question: 'Quel outil permet de planifier les tâches d\'un projet sur un axe temporel ?',
        options: ['Le cahier des charges', 'Le diagramme de Gantt', 'La nomenclature', 'Le dessin de définition'],
        correct: 1,
        explanation: 'Le diagramme de Gantt représente les tâches et leur durée sur un axe temporel (semaines).'
      },
      {
        type: 'vrai_faux',
        question: 'Un jalon est une tâche qui dure plusieurs semaines.',
        correct: false,
        explanation: 'Un jalon est un point de contrôle (durée zéro) pour vérifier l\'avancement du projet, pas une tâche.'
      },
      {
        type: 'qcm',
        question: 'Quel est le rôle du chef de projet ?',
        options: ['Programmer l\'Arduino', 'Modéliser le boîtier en 3D', 'Coordonner l\'équipe et suivre le planning', 'Fabriquer les pièces au FabLab'],
        correct: 2,
        explanation: 'Le chef de projet coordonne l\'équipe, suit le planning et vérifie les jalons.'
      },
      {
        type: 'qcm',
        question: 'Que contient le cahier des charges fonctionnel ?',
        options: ['Le programme Arduino', 'Les fonctions, contraintes et critères de réussite', 'Le diagramme de Gantt', 'Les fichiers STL'],
        correct: 1,
        explanation: 'Le CdCF décrit les fonctions (ce que l\'objet doit faire), les contraintes et les critères de réussite.'
      },
      {
        type: 'vrai_faux',
        question: 'Dans un diagramme de Gantt, certaines tâches peuvent se dérouler en parallèle.',
        correct: true,
        explanation: 'Le diagramme de Gantt permet de visualiser les tâches en parallèle (ex : modélisation 3D et programmation Arduino en même temps).'
      },
      {
        type: 'qcm',
        question: 'Qu\'est-ce qu\'un livrable dans un projet ?',
        options: ['Un livre de cours', 'Un résultat concret produit à la fin d\'une étape', 'Un logiciel de planification', 'Le budget du projet'],
        correct: 1,
        explanation: 'Un livrable est un résultat concret et mesurable attendu à la fin d\'une étape du projet.'
      },
      {
        type: 'vrai_faux',
        question: 'Le cahier des charges décrit comment fabriquer l\'objet.',
        correct: false,
        explanation: 'Le CdCF décrit ce que l\'objet doit faire (les fonctions), pas comment le fabriquer. C\'est la phase de conception qui répond au "comment".'
      },
      {
        type: 'qcm',
        question: 'Quel outil numérique permet de suivre l\'avancement des tâches en équipe ?',
        options: ['TinkerCAD', 'Arduino IDE', 'Trello / Kanban', 'Un slicer'],
        correct: 2,
        explanation: 'Trello (tableau Kanban) permet de suivre les tâches : à faire, en cours, terminé.'
      },
      {
        type: 'qcm',
        question: 'Dans quel ordre se déroule le cycle de projet ?',
        options: [
          'Besoin → CdCF → Conception → Fabrication → Validation → Présentation',
          'Fabrication → Besoin → CdCF → Validation → Conception',
          'Conception → Besoin → Fabrication → CdCF → Validation',
          'CdCF → Fabrication → Conception → Besoin → Présentation'
        ],
        correct: 0,
        explanation: 'Le cycle de projet suit l\'ordre logique : analyser le besoin, rédiger le CdCF, concevoir, fabriquer, valider puis présenter.'
      }
    ];
    const quiz = new QuizEngine('quiz-container', questions, { showFeedback: true });
  </script>
</body>
</html>
