<body>
  <div id="app" data-page="4eme"
    data-breadcrumb='[{"label":"Accueil","url":"../../index.html"},{"label":"4ème","url":"../index.html"},{"label":"T3 — Séquence 9"},{"label":"Quiz"}]'
    data-print-title="QUIZ — Séquence 9 : Fabrication et validation"
    data-print-subtitle="4ème · Technologie · Lycée Français de Tananarive">
    <main class="site-main">
      <div class="page-header">
        <span class="page-level-badge level-4eme">&#x1F7E2; 4ème · T3 · Quiz</span>
        <h1>Quiz — Séquence 9</h1>
        <p class="page-description">Fabrication et validation au FabLab — Teste tes connaissances !</p>
      </div>
      <div class="page-actions no-print">
        <a href="seq9-revision.html" class="btn btn-outline">&#x1F4D6; Révision</a>
        <a href="seq9-structuration.html" class="btn btn-outline">&#x1F4D8; Structuration</a>

        <div id="quiz-container"></div>
      </div>
    </main>
  </div>
  <script src="../../js/components.js"></script>
  <script src="../../js/quiz-engine.js"></script>
  <script>
    const questions = [
      {
        type: 'qcm',
        question: 'Que signifie FabLab ?',
        options: ['Fabrique de Laboratoire', 'Fabrication Laboratory', 'Fabrication Laser Base', 'Fabrique Libre'],
        correct: 1,
        explanation: 'FabLab signifie Fabrication Laboratory (laboratoire de fabrication). C\'est un atelier de fabrication numérique ouvert.'
      },
      {
        type: 'qcm',
        question: 'Quel fichier faut-il pour lancer une impression 3D ?',
        options: ['Un fichier SVG', 'Un fichier PDF', 'Un fichier STL ou 3MF', 'Un fichier MP3'],
        correct: 2,
        explanation: 'L\'impression 3D utilise des fichiers STL ou 3MF qui décrivent la géométrie 3D de la pièce.'
      },
      {
        type: 'vrai_faux',
        question: 'On peut toucher la buse de l\'imprimante 3D pendant l\'impression.',
        correct: false,
        explanation: 'JAMAIS ! La buse est à plus de 200°C pendant l\'impression. C\'est une règle de sécurité fondamentale au FabLab.'
      },
      {
        type: 'qcm',
        question: 'Quel est le rôle du slicer dans la chaîne de fabrication ?',
        options: ['Modéliser la pièce en 3D', 'Trancher le modèle 3D en couches et générer le G-code', 'Découper au laser', 'Programmer l\'Arduino'],
        correct: 1,
        explanation: 'Le slicer (Cura, PrusaSlicer) tranche le modèle STL en couches et génère le fichier G-code que l\'imprimante comprend.'
      },
      {
        type: 'vrai_faux',
        question: 'La découpe laser utilise un fichier SVG.',
        correct: true,
        explanation: 'La découpe laser xTool M1 utilise des fichiers SVG (dessins vectoriels 2D) pour découper ou graver des matériaux plats.'
      },
      {
        type: 'qcm',
        question: 'Comment valide-t-on un prototype ?',
        options: ['En le montrant au professeur', 'En vérifiant qu\'il respecte le cahier des charges point par point', 'En le pesant', 'En le photographiant'],
        correct: 1,
        explanation: 'La validation consiste à vérifier que le prototype respecte chaque critère du cahier des charges.'
      },
      {
        type: 'qcm',
        question: 'Dans quel ordre se déroule la chaîne numérique pour l\'impression 3D ?',
        options: [
          'Modélisation → Export STL → Slicing → Impression',
          'Impression → Slicing → Export STL → Modélisation',
          'Slicing → Modélisation → Impression → Export STL',
          'Export STL → Impression → Modélisation → Slicing'
        ],
        correct: 0,
        explanation: 'On modélise d\'abord en 3D, puis on exporte en STL, on passe par le slicer pour obtenir le G-code, et enfin on lance l\'impression.'
      },
      {
        type: 'vrai_faux',
        question: 'Un prototype qui ne respecte pas un critère du CdCF est considéré comme validé.',
        correct: false,
        explanation: 'Un prototype doit respecter TOUS les critères du CdCF pour être validé. Sinon, il faut proposer des améliorations.'
      },
      {
        type: 'qcm',
        question: 'Quelle est la dernière partie d\'une présentation orale de projet ?',
        options: ['L\'introduction', 'Le cahier des charges', 'La démonstration', 'Le bilan (difficultés + améliorations)'],
        correct: 3,
        explanation: 'La présentation se termine par le bilan : difficultés rencontrées, solutions trouvées et améliorations possibles.'
      },
      {
        type: 'qcm',
        question: 'Pourquoi faut-il activer la ventilation lors de la découpe laser ?',
        options: ['Pour refroidir la machine', 'Pour évacuer les fumées toxiques', 'Pour faire moins de bruit', 'Pour améliorer la qualité de coupe'],
        correct: 1,
        explanation: 'La découpe laser produit des fumées toxiques. La ventilation est obligatoire pour les évacuer et protéger la santé.'
      }
    ];
    const quiz = new QuizEngine('quiz-container', questions, { showFeedback: true });
  </script>
</body>
</html>
