</head>
<body>
  <div id="app" data-page="4eme"
    data-breadcrumb='[{"label":"Accueil","url":"../../index.html"},{"label":"4ème","url":"../index.html"},{"label":"T3 — Séquence 9"},{"label":"Quiz"}]'>

    <main class="site-main">
      <div class="page-header">
        <span class="page-level-badge level-4eme">&#x1F7E2; 4ème · Trimestre 3 · Quiz</span>
        <h1>Quiz — Fabrication numérique (FabLab)</h1>
        <p class="page-description">Teste tes connaissances sur le FabLab, l'impression 3D et la fabrication numérique.</p>
      </div>
      <div class="page-actions no-print">
        <a href="seq9-activite.html" class="btn btn-outline">&#x1F4DD; Revoir la fiche</a>
      </div>
      <div class="quiz-container" id="quiz-container"></div>
    </main>
  </div>

  <script src="../../js/components.js"></script>
  <script src="../../js/quiz-engine.js"></script>
  <script>
    const questions = [
      {
        type: 'qcm',
        question: 'Que signifie FabLab ?',
        options: ['Fabrication Laboratory', 'Factory Label', 'Fabric Lab', 'Fashion Laboratory'],
        correct: 0,
        explanation: 'FabLab signifie "Fabrication Laboratory" (laboratoire de fabrication). C\'est un atelier ouvert équipé de machines à commande numérique.'
      },
      {
        type: 'qcm',
        question: 'L\'impression 3D FDM fonctionne en...',
        options: ['Découpant de la matière', 'Déposant du fil fondu couche par couche', 'Moulant du plastique liquide', 'Collant des feuilles de papier'],
        correct: 1,
        explanation: 'L\'impression FDM (Fused Deposition Modeling) fonctionne en faisant fondre un filament de plastique (PLA, ABS) et en le déposant couche par couche.'
      },
      {
        type: 'vrai_faux',
        question: 'Le format de fichier pour l\'impression 3D est le STL.',
        correct: true,
        explanation: 'Le fichier STL (Standard Tessellation Language) est le format standard exporté depuis les logiciels de modélisation 3D vers les logiciels slicer (Cura) pour l\'impression.'
      },
      {
        type: 'qcm',
        question: 'Quel logiciel transforme un fichier STL en instructions pour l\'imprimante 3D ?',
        options: ['Tinkercad', 'Un slicer (ex : Cura)', 'Word', 'mBlock'],
        correct: 1,
        explanation: 'Un slicer (comme Cura) découpe le modèle 3D en couches et génère le G-code, les instructions que l\'imprimante 3D exécute.'
      },
      {
        type: 'qcm',
        question: 'Pour graver un logo sur du bois, la machine la plus adaptée est...',
        options: ['L\'imprimante 3D', 'La découpeuse laser', 'La fraiseuse CNC', 'Le scanner 3D'],
        correct: 1,
        explanation: 'La découpeuse laser est idéale pour graver avec précision sur des surfaces planes en bois, acrylique ou carton.'
      },
      {
        type: 'vrai_faux',
        question: 'La fabrication numérique ne produit aucun déchet.',
        correct: false,
        explanation: 'La fabrication numérique produit des déchets : ratés d\'impression, supports à retirer, chutes de matière. Cependant, elle en produit moins que la fabrication par usinage (enlèvement de matière).'
      },
      {
        type: 'qcm',
        question: 'Quel est l\'avantage principal de la fabrication numérique pour la réparabilité ?',
        options: ['C\'est gratuit', 'On peut fabriquer des pièces sur mesure même si elles ne sont plus vendues', 'Les pièces sont plus solides que les originales', 'C\'est plus rapide que l\'usine'],
        correct: 1,
        explanation: 'La fabrication numérique permet de concevoir et produire des pièces de remplacement sur mesure, même pour des objets dont les pièces ne sont plus disponibles dans le commerce.'
      },
      {
        type: 'qcm',
        question: 'Le PLA (acide polylactique) utilisé en impression 3D est fabriqué à partir de...',
        options: ['Pétrole', 'Amidon de maïs (ressource renouvelable)', 'Minerai de fer', 'Sable'],
        correct: 1,
        explanation: 'Le PLA est un bioplastique fabriqué à partir d\'amidon de maïs ou de canne à sucre. Il est biodégradable (dans des conditions industrielles) et renouvelable.'
      },
      {
        type: 'vrai_faux',
        question: 'Un scanner 3D permet de numériser un objet réel pour en créer un modèle 3D.',
        correct: true,
        explanation: 'Le scanner 3D capture la forme et les dimensions d\'un objet physique pour créer un fichier numérique 3D, utile pour reproduire ou modifier l\'objet.'
      },
      {
        type: 'qcm',
        question: 'Comparée à la fabrication industrielle, la fabrication numérique locale...',
        options: ['Produit en plus grande quantité', 'Réduit les transports et permet la personnalisation', 'Est toujours moins chère', 'Utilise les mêmes machines'],
        correct: 1,
        explanation: 'La fabrication numérique locale réduit les transports (pas d\'importation), permet une personnalisation totale de chaque pièce, et produit à la demande (pas de surproduction).'
      }
    ];

    const quiz = new QuizEngine('quiz-container', questions, { showFeedback: true });
  </script>
</body>
</html>
