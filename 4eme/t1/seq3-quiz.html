</head>
<body>
  <div id="app" data-page="4eme"
    data-breadcrumb='[{"label":"Accueil","url":"../../index.html"},{"label":"4ème","url":"../index.html"},{"label":"T1 — Séquence 3"},{"label":"Quiz"}]'>

    <main class="site-main">
      <div class="page-header">
        <span class="page-level-badge level-4eme">&#x1F7E2; 4ème · Trimestre 1 · Quiz</span>
        <h1>Quiz — Programmation Micro:bit</h1>
        <p class="page-description">Teste tes connaissances sur la carte Micro:bit, ses capteurs et la programmation MakeCode.</p>
      </div>
      <div class="page-actions no-print">
        <a href="seq3-activite.html" class="btn btn-outline">&#x1F4DD; Revoir la fiche</a>
      </div>
      <div class="quiz-container" id="quiz-container"></div>
    </main>
  </div>

  <script src="../../js/components.js"></script>
  <script src="../../js/quiz-engine.js"></script>
  <script>
    const questions = [
      {
        type: 'qcm',
        question: 'Combien de LEDs possède la matrice de la Micro:bit ?',
        options: ['9 (3×3)', '16 (4×4)', '25 (5×5)', '36 (6×6)'],
        correct: 2,
        explanation: 'La Micro:bit possède une matrice de 25 LEDs organisées en 5 lignes et 5 colonnes.'
      },
      {
        type: 'vrai_faux',
        question: 'La Micro:bit possède un accéléromètre intégré.',
        correct: true,
        explanation: 'L\'accéléromètre est un capteur intégré qui permet de détecter les mouvements (secouer, incliner, tourner).'
      },
      {
        type: 'qcm',
        question: 'Quel événement utilise-t-on pour lancer un dé numérique ?',
        options: ['Lorsque bouton A pressé', 'Lorsque secoué', 'Au démarrage', 'Toutes les 500 ms'],
        correct: 1,
        explanation: 'On utilise "lorsque secoué" pour simuler le lancer d\'un dé : secouer la carte = lancer le dé.'
      },
      {
        type: 'qcm',
        question: 'Qu\'est-ce qu\'une variable en programmation ?',
        options: ['Un bloc de couleur dans MakeCode', 'Un espace mémoire qui stocke une valeur modifiable', 'Un capteur de la Micro:bit', 'Un type de câble USB'],
        correct: 1,
        explanation: 'Une variable est un espace mémoire auquel on donne un nom (ex : score) et qui stocke une valeur pouvant changer pendant l\'exécution du programme.'
      },
      {
        type: 'vrai_faux',
        question: 'On programme la Micro:bit avec le logiciel Scratch.',
        correct: false,
        explanation: 'On programme la Micro:bit avec MakeCode (makecode.microbit.org), pas Scratch. MakeCode utilise des blocs visuels similaires mais adaptés à la Micro:bit.'
      },
      {
        type: 'qcm',
        question: 'Quel capteur mesure la température sur la Micro:bit ?',
        options: ['Un thermomètre externe', 'Le capteur de température intégré au processeur', 'L\'accéléromètre', 'Le bouton A'],
        correct: 1,
        explanation: 'La Micro:bit possède un capteur de température intégré dans le processeur. Il mesure la température ambiante.'
      },
      {
        type: 'qcm',
        question: 'Pour afficher un nombre aléatoire entre 1 et 6, on utilise le bloc...',
        options: ['montrer texte', 'montrer nombre + choisir au hasard de 1 à 6', 'montrer icône', 'définir variable à 6'],
        correct: 1,
        explanation: 'On combine "montrer nombre" avec "choisir au hasard de 1 à 6" pour afficher un résultat aléatoire comme un dé.'
      },
      {
        type: 'vrai_faux',
        question: 'La Micro:bit peut communiquer avec une autre Micro:bit par radio.',
        correct: true,
        explanation: 'La Micro:bit possède un module radio intégré qui permet d\'envoyer et recevoir des messages entre plusieurs cartes.'
      },
      {
        type: 'qcm',
        question: 'Que fait le bloc "lorsque bouton A+B pressé" ?',
        options: ['Il appuie automatiquement sur les boutons', 'Il exécute du code quand on appuie sur A et B en même temps', 'Il désactive les boutons', 'Il affiche les lettres A et B'],
        correct: 1,
        explanation: '"Lorsque bouton A+B pressé" est un événement qui se déclenche quand l\'utilisateur appuie simultanément sur les deux boutons A et B.'
      },
      {
        type: 'qcm',
        question: 'La matrice LED de la Micro:bit est un...',
        options: ['Capteur', 'Actionneur', 'Processeur', 'Module de communication'],
        correct: 1,
        explanation: 'La matrice LED est un actionneur : elle produit une action visible (affichage lumineux) en réponse aux instructions du programme.'
      }
    ];

    const quiz = new QuizEngine('quiz-container', questions, { showFeedback: true });
  </script>
</body>
</html>
