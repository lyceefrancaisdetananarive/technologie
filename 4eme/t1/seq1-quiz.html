<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz — Séq. 1 : Innovations technologiques | 4ème</title>
  <link rel="icon" type="image/png" href="../../img/logo-lft.png">
  <link rel="stylesheet" href="../../css/style.css">
</head>
<body>
  <div id="app" data-page="4eme"
    data-breadcrumb='[{"label":"Accueil","url":"../../index.html"},{"label":"4ème","url":"../index.html"},{"label":"T1 — Séquence 1"},{"label":"Quiz"}]'>

    <main class="site-main">
      <div class="page-header">
        <span class="page-level-badge level-4eme">&#x1F7E2; 4ème · Trimestre 1 · Quiz</span>
        <h1>Quiz — Innovations technologiques et évolution</h1>
        <p class="page-description">Teste tes connaissances sur les innovations, leur évolution et le cycle de vie.</p>
      </div>
      <div class="page-actions no-print">
        <a href="seq1-activite.html" class="btn btn-outline">&#x1F4DD; Revoir la fiche</a>
      </div>
      <div class="quiz-container" id="quiz-container"></div>
    </main>
  </div>

  <script src="../../js/components.js"></script>
  <script src="../../js/quiz-engine.js"></script>
  <script>
    const questions = [
      {
        type: 'qcm',
        question: 'Qu\'est-ce qu\'une innovation de rupture ?',
        options: ['Une amélioration progressive', 'Un changement radical qui transforme l\'objet', 'Une réparation d\'un objet cassé', 'Un retour à une technologie ancienne'],
        correct: 1,
        explanation: 'Une innovation de rupture est un changement radical qui transforme fondamentalement l\'objet ou son usage. Par exemple, l\'ajout d\'un moteur électrique au vélo.'
      },
      {
        type: 'qcm',
        question: 'Le passage de 3 à 21 vitesses sur un vélo est une innovation...',
        options: ['De rupture', 'Incrémentale', 'Numérique', 'Écologique'],
        correct: 1,
        explanation: 'C\'est une innovation incrémentale car elle améliore progressivement une fonction existante (le changement de vitesses) sans transformer radicalement l\'objet.'
      },
      {
        type: 'vrai_faux',
        question: 'La draisienne de 1817 avait des pédales.',
        correct: false,
        explanation: 'La draisienne n\'avait PAS de pédales. Le conducteur avançait en poussant le sol avec ses pieds. Les pédales sont apparues en 1861 avec le vélocipède de Michaux.'
      },
      {
        type: 'qcm',
        question: 'Quelle est la première étape du cycle de vie d\'un objet ?',
        options: ['La fabrication', 'L\'utilisation', 'L\'extraction des matières premières', 'La distribution'],
        correct: 2,
        explanation: 'Le cycle de vie commence par l\'extraction des matières premières (minerais, pétrole, bois...) nécessaires à la fabrication de l\'objet.'
      },
      {
        type: 'qcm',
        question: 'Combien d\'étapes comporte le cycle de vie d\'un objet technique ?',
        options: ['3 étapes', '4 étapes', '5 étapes', '7 étapes'],
        correct: 2,
        explanation: 'Le cycle de vie comporte 5 étapes : extraction, fabrication, distribution, utilisation, fin de vie.'
      },
      {
        type: 'vrai_faux',
        question: 'L\'étape « fin de vie » concerne uniquement la mise en décharge.',
        correct: false,
        explanation: 'La fin de vie comprend plusieurs possibilités : le recyclage, le réemploi, la revente, l\'incinération OU la mise en décharge. Le recyclage et le réemploi sont à privilégier.'
      },
      {
        type: 'qcm',
        question: 'Quel est un impact négatif majeur du smartphone ?',
        options: ['L\'accès à l\'information', 'La communication facilitée', 'L\'extraction de minerais rares (pollution)', 'Le GPS intégré'],
        correct: 2,
        explanation: 'L\'extraction de minerais rares (lithium, cobalt, tantale, or) nécessaires aux smartphones pollue les sols et l\'eau, et pose des problèmes éthiques (conditions de travail).'
      },
      {
        type: 'vrai_faux',
        question: 'Une voiture électrique n\'a aucun impact négatif sur l\'environnement.',
        correct: false,
        explanation: 'Même si elle n\'émet pas de CO2 en roulant, la fabrication de ses batteries (lithium, cobalt) est très polluante, et le recyclage des batteries reste difficile.'
      },
      {
        type: 'qcm',
        question: 'Pour réduire l\'impact environnemental d\'un objet, il faut prioritairement...',
        options: ['Acheter le dernier modèle', 'Allonger sa durée de vie (réparer, réutiliser)', 'Le jeter à la poubelle classique', 'Ne pas l\'utiliser du tout'],
        correct: 1,
        explanation: 'Allonger la durée de vie d\'un objet (réparation, réemploi) réduit la nécessité de produire un nouvel objet, ce qui diminue les impacts sur toutes les étapes du cycle de vie.'
      },
      {
        type: 'qcm',
        question: 'Le sigle DEEE signifie...',
        options: ['Département d\'Études Électriques Européen', 'Déchets d\'Équipements Électriques et Électroniques', 'Direction de l\'Énergie et de l\'Environnement', 'Dispositif d\'Évaluation des Émissions Environnementales'],
        correct: 1,
        explanation: 'DEEE = Déchets d\'Équipements Électriques et Électroniques. Ce sont les appareils en fin de vie qui doivent être déposés dans des points de collecte spécifiques pour être recyclés.'
      }
    ];

    const quiz = new QuizEngine('quiz-container', questions, { showFeedback: true });
  </script>
</body>
</html>
