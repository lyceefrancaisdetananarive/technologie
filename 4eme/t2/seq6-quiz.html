<body>
  <div id="app" data-page="4eme"
    data-breadcrumb='[{"label":"Accueil","url":"../../index.html"},{"label":"4ème","url":"../index.html"},{"label":"T2 — Séquence 6"},{"label":"Quiz"}]'>
    <main class="site-main">
      <div class="page-header">
        <span class="page-level-badge level-4eme">&#x1F7E2; 4ème · Trimestre 2 · Quiz</span>
        <h1>Quiz — Modélisation 3D et fabrication numérique</h1>
        <p class="page-description">Teste tes connaissances sur les fichiers 3D, l'impression 3D et la découpe laser.</p>
      </div>
      <div class="page-actions no-print">
        <a href="seq6-activite.html" class="btn btn-outline">&#x1F4DD; Revoir la fiche</a>
      </div>
      <div class="quiz-container" id="quiz-container"></div>
    </main>
  </div>
  <script src="../../js/components.js"></script>
  <script src="../../js/quiz-engine.js"></script>
  <script>
    const questions = [
      {
        type: 'qcm',
        question: 'Quel est le format de fichier le plus utilisé pour l\'impression 3D ?',
        options: ['PDF', 'STL', 'MP3', 'HTML'],
        correct: 1,
        explanation: 'Le format STL (Standard Tessellation Language) est le format standard pour l\'impression 3D. Il décrit la géométrie de l\'objet par un maillage de triangles.'
      },
      {
        type: 'vrai_faux',
        question: 'L\'impression 3D FDM dépose du plastique fondu couche par couche.',
        correct: true,
        explanation: 'FDM (Fused Deposition Modeling) fonctionne en faisant fondre un filament plastique (PLA, ABS) et en le déposant couche par couche pour construire l\'objet.'
      },
      {
        type: 'qcm',
        question: 'Qu\'est-ce qu\'un slicer ?',
        options: ['Une imprimante 3D', 'Un logiciel qui tranche le modèle 3D en couches', 'Un format de fichier', 'Un type de plastique'],
        correct: 1,
        explanation: 'Le slicer est un logiciel (ex : Cura, PrusaSlicer) qui découpe le modèle 3D en couches et génère le G-code, les instructions pour l\'imprimante.'
      },
      {
        type: 'qcm',
        question: 'Quelle machine utilise un faisceau laser pour couper des matériaux plats ?',
        options: ['L\'imprimante 3D', 'La fraiseuse CNC', 'La découpeuse laser (xTool M1)', 'Le tour à métaux'],
        correct: 2,
        explanation: 'La découpeuse laser (comme la xTool M1) utilise un faisceau laser concentré pour couper ou graver des matériaux plats : bois, acrylique, carton, cuir.'
      },
      {
        type: 'vrai_faux',
        question: 'Le format 3MF peut contenir des informations de couleur et de matériau, contrairement au STL.',
        correct: true,
        explanation: 'Le format 3MF est plus riche que le STL : il peut inclure les couleurs, les matériaux, les textures et d\'autres métadonnées, en plus de la géométrie.'
      },
      {
        type: 'qcm',
        question: 'Pourquoi ajoute-t-on parfois des supports lors de l\'impression 3D ?',
        options: ['Pour que l\'objet soit plus lourd', 'Pour soutenir les parties en porte-à-faux', 'Pour économiser du plastique', 'Pour rendre l\'objet plus joli'],
        correct: 1,
        explanation: 'Les supports soutiennent les parties « en l\'air » (porte-à-faux > 45°). Sans support, le plastique fondu tomberait car il n\'y a rien en dessous.'
      },
      {
        type: 'qcm',
        question: 'Quel matériau NE peut PAS être découpé à la découpeuse laser ?',
        options: ['Bois contreplaqué', 'Acrylique', 'Métal épais', 'Carton'],
        correct: 2,
        explanation: 'Le métal épais ne peut pas être découpé avec une découpeuse laser de type xTool M1. Ce type de machine est adapté au bois, acrylique, carton, cuir et tissu.'
      },
      {
        type: 'vrai_faux',
        question: 'Le G-code est un langage d\'instructions compréhensible par les machines numériques.',
        correct: true,
        explanation: 'Le G-code contient les instructions de déplacement et de fabrication pour les machines numériques : positions X/Y/Z, vitesse, température, débit de plastique, etc.'
      },
      {
        type: 'qcm',
        question: 'Quel paramètre du slicer détermine la solidité de la pièce imprimée ?',
        options: ['La couleur du filament', 'Le pourcentage de remplissage', 'Le nom du fichier', 'La marque de l\'imprimante'],
        correct: 1,
        explanation: 'Le pourcentage de remplissage (infill) détermine la quantité de plastique à l\'intérieur : 20% = léger et économique, 100% = très solide mais long et coûteux.'
      },
      {
        type: 'qcm',
        question: 'Quel type de fichier utilise la découpeuse laser ?',
        options: ['STL et 3MF', 'SVG et DXF (dessins vectoriels)', 'MP4 et AVI', 'DOCX et PDF'],
        correct: 1,
        explanation: 'La découpeuse laser utilise des fichiers vectoriels 2D (SVG, DXF) car elle travaille sur des matériaux plats. L\'impression 3D utilise STL/3MF.'
      }
    ];
    const quiz = new QuizEngine('quiz-container', questions, { showFeedback: true });
  </script>
</body>
</html>
