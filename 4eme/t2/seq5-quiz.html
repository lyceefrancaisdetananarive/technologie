<body>
  <div id="app" data-page="4eme"
    data-breadcrumb='[{"label":"Accueil","url":"../../index.html"},{"label":"4ème","url":"../index.html"},{"label":"T2 — Séquence 5"},{"label":"Quiz"}]'>

    <main class="site-main">
      <div class="page-header">
        <span class="page-level-badge level-4eme">&#x1F7E2; 4ème · Trimestre 2 · Quiz</span>
        <h1>Quiz — Programmation et automatisation (mBlock / Scratch)</h1>
        <p class="page-description">Teste tes connaissances sur la programmation par blocs, les sprites, les messages et les interfaces graphiques.</p>
      </div>
      <div class="page-actions no-print">
        <a href="seq5-activite.html" class="btn btn-outline">&#x1F4DD; Revoir la fiche</a>
      </div>
      <div class="quiz-container" id="quiz-container"></div>
    </main>
  </div>

  <script src="../../js/components.js"></script>
  <script src="../../js/quiz-engine.js"></script>
  <script>
    const questions = [
      {
        type: 'qcm',
        question: 'Qu\'est-ce qu\'un sprite dans Scratch ou mBlock ?',
        options: ['Une ligne de code', 'Un objet graphique programmable', 'Un type de variable', 'Un câble de connexion'],
        correct: 1,
        explanation: 'Un sprite est un objet graphique programmable (feu, bouton, personnage) que l\'on peut animer et programmer dans Scratch/mBlock.'
      },
      {
        type: 'vrai_faux',
        question: 'Un sprite peut avoir plusieurs costumes pour changer d\'apparence.',
        correct: true,
        explanation: 'Un sprite peut avoir plusieurs costumes. Par exemple, un feu tricolore a 3 costumes : vert, orange et rouge. On bascule entre les costumes pour changer son apparence.'
      },
      {
        type: 'qcm',
        question: 'Comment synchroniser deux feux tricolores dans Scratch ?',
        options: ['En utilisant des variables uniquement', 'En utilisant des messages (envoyer à tous / quand je reçois)', 'En dessinant les deux feux sur le même sprite', 'En utilisant deux ordinateurs'],
        correct: 1,
        explanation: 'On utilise les messages « envoyer à tous » et « quand je reçois » pour que les sprites communiquent entre eux et se synchronisent.'
      },
      {
        type: 'qcm',
        question: 'Quel bloc permet de répéter le cycle du feu tricolore indéfiniment ?',
        options: ['Attendre 1 seconde', 'Répéter indéfiniment', 'Si...alors', 'Quand drapeau vert cliqué'],
        correct: 1,
        explanation: 'Le bloc « Répéter indéfiniment » (boucle infinie) permet de faire tourner le cycle vert → orange → rouge en continu.'
      },
      {
        type: 'vrai_faux',
        question: 'Dans un carrefour, les deux feux peuvent être verts en même temps.',
        correct: false,
        explanation: 'Les deux feux ne doivent JAMAIS être verts en même temps, sinon les voitures des deux voies avanceraient et provoqueraient un accident.'
      },
      {
        type: 'qcm',
        question: 'À quoi sert une variable « demandePieton » dans le programme du carrefour ?',
        options: ['À compter les voitures', 'À savoir si un piéton a appuyé sur le bouton', 'À changer la couleur du feu', 'À mesurer la température'],
        correct: 1,
        explanation: 'La variable « demandePieton » (0 ou 1) permet au programme de savoir si un piéton a demandé à traverser, et de déclencher le cycle piéton.'
      },
      {
        type: 'qcm',
        question: 'Quelle est la différence entre mBlock et Scratch ?',
        options: ['mBlock est un langage textuel, Scratch est visuel', 'mBlock peut aussi piloter des cartes électroniques (Arduino)', 'Scratch est plus récent que mBlock', 'Il n\'y a aucune différence'],
        correct: 1,
        explanation: 'mBlock est basé sur Scratch mais ajoute la possibilité de piloter des cartes électroniques (Arduino, Micro:bit). Scratch est dédié à la programmation visuelle pure.'
      },
      {
        type: 'vrai_faux',
        question: 'Le bloc « quand drapeau vert cliqué » est un bloc de la catégorie Contrôle.',
        correct: false,
        explanation: 'Ce bloc appartient à la catégorie « Événements ». Les blocs de contrôle sont : répéter, attendre, si...alors, etc.'
      },
      {
        type: 'qcm',
        question: 'Qu\'est-ce qu\'une interface graphique ?',
        options: ['Un câble reliant l\'ordinateur à l\'Arduino', 'Un programme visuel permettant l\'interaction homme-machine', 'Un type de capteur', 'Un langage de programmation'],
        correct: 1,
        explanation: 'Une interface graphique est un programme visuel (avec boutons, images, animations) qui permet à l\'utilisateur d\'interagir avec un système.'
      },
      {
        type: 'qcm',
        question: 'Dans le cycle du feu tricolore, quelle couleur dure le moins longtemps ?',
        options: ['Le vert', 'L\'orange', 'Le rouge', 'Elles durent toutes le même temps'],
        correct: 1,
        explanation: 'L\'orange (2 secondes) est la phase la plus courte car elle sert uniquement à avertir que le feu va passer au rouge. Le vert et le rouge durent 5 secondes chacun.'
      }
    ];

    const quiz = new QuizEngine('quiz-container', questions, { showFeedback: true });
  </script>
</body>
</html>
